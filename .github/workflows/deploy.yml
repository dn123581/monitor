name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd $HOME/monitor
            git fetch origin
            git checkout main
            git pull origin main

            echo ">>> 1. Pulling latest images..."
            docker compose pull

            echo ">>> 2. Deploying/Updating services (Low-downtime)..."
            docker compose up -d --wait --wait-timeout 120 --remove-orphans

            echo ">>> Status:"
            docker compose ps

            echo ">>> Deploy OK"
